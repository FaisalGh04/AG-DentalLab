[build]
builder = "NIXPACKS"
buildCommand = "npx --yes prisma@6.19.3 generate && npx next build"

[deploy]
preDeployCommand = "npx --yes prisma@6.19.3 migrate deploy"
startCommand = "npm run start"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
numReplicas = 1
